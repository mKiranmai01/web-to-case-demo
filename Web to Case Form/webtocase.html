<META HTTP-EQUIV="Content-type" CONTENT="text/html; charset=UTF-8">
<head>
    <title>Support Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <script src="webtocase.js"></script>

    <div class="container">

        <h2 class="form-title">Raise a Support Case</h2>

        <p class="subtitle">
            Fill in the details below and our support team will get back to you.
        </p>

        <form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DgK00000EbSdj"
        method="POST"
        id="caseForm">

        <input type=hidden name="orgid" value="00DgK00000EbSdj">
        <input type=hidden name="retURL" value="https://mkiranmai01.github.io/Web-form-for-Support-Requests/thank-you.html">

            <div class="form-group">
                <label
                    for="name">Name <span style="color: red;">*</span></label>
                <input
                    type="text"
                    name="name"
                    id="name"
                    placeholder="Enter your name"
                    required
                >
            </div>


            <div class="form-group">
                <label for="email">Email <span style="color: red;">*</span></label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="phone">Phone </label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="Enter your phone number"
                >
            </div>

            <div class="form-group">
                <label for="caseType">Case Type <span style="color: red;">*</span></label>
                    <select id="caseType" name="type" required onchange="showFields()">
                        <option value ="">Select a case type</option>
                        <!--<option value="order">Order Inquiry</option>-->
                        <option>Product Issue</option>
                        <option>Billing Issue</option>
                        <option>Information Update</option>
                        <option>General Inquiry</option>
                    </select>
            </div>

            <div id="dynamicFields"></div>

            <div class="form-group">
                <label for="subject">Subject <sapn style="color: red">*</sapn></label>
                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Breif summary of your issue"
                    maxlength="100"
                    required
                >
            </div>


            <div class="form-group">
                <label for="description">Description</label>
                <textarea 
                    id="description"
                    name="description"
                    placeholder="Provide detailed information about your issue"></textarea>  
            </div>

            <!--
            <div class="form-file">
                <label>Attachment</label>
                <input type="file">

            </div>
            -->


        <input type="hidden"  id="external" name="external" value="1" /><br>

        <button type="submit">Submit Case</button>

        </form>

    </div>

</body>

<script>
    window.addEventListener('pageshow', function(event) {
        document.getElementById('caseForm').reset();

        const dynamicFields = document.getElementById('dynamicFields');
        if(dynamicFields) {
            dynamicFields.innerHTML = '';
        }
    });
</script>
